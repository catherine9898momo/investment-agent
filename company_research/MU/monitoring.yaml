monitoring_table:
  - id: hbm_progress
    category: thesis
    metric: HBM4/HBM4E progress
    target_or_question: HBM4 volume shipments continue and HBM4E remains on track for 2027.
    current_status: HBM4 volume shipments have begun; HBM4E targeted for 2027.
    signal_if_positive: Customer qualification expands; capacity sold under strategic agreements.
    signal_if_negative: Product delay, qualification issue, lower HBM demand, or pricing concession.
    severity: high
  - id: pricing_power
    category: industry_cycle
    metric: DRAM/NAND/HBM pricing
    target_or_question: Contract and spot prices remain tight without early signs of peak pricing.
    current_status: FY2026 Q2 DRAM prices rose mid-60s sequentially; NAND rose high-70s sequentially.
    signal_if_positive: ASPs keep rising or hold despite volume growth.
    signal_if_negative: Sequential ASP decline or management language shifts from shortage to balance.
    severity: high
  - id: gross_margin
    category: valuation
    metric: Gross margin
    target_or_question: FY2026 Q3 gross margin tracks near the 81% guide.
    current_status: FY2026 Q2 non-GAAP gross margin was 74.9%; Q3 guide is about 81%.
    signal_if_positive: Margin guide is met or raised with disciplined cost/capex commentary.
    signal_if_negative: Margin misses guide or reverses faster than revenue.
    severity: high
  - id: free_cash_flow
    category: valuation
    metric: Free cash flow after capex
    target_or_question: Strong EPS converts into free cash flow despite rising capex.
    current_status: FY2026 Q2 adjusted FCF was $6.9B with net capex of $5.0B.
    signal_if_positive: Operating cash flow covers capex with room for debt reduction or returns.
    signal_if_negative: Capex absorbs cash flow while EPS remains optically high.
    severity: high
  - id: inventory
    category: industry_cycle
    metric: Inventory days
    target_or_question: Inventory days stay healthy; DRAM remains tight.
    current_status: FY2026 Q2 inventory days were 123; DRAM inventory days were below 120.
    signal_if_positive: Inventory days stable or falling while revenue rises.
    signal_if_negative: Inventory builds before demand commentary weakens.
    severity: medium
  - id: capex_discipline
    category: management
    metric: Capex and supply additions
    target_or_question: Growth capex is matched to customer-backed demand and strategic agreements.
    current_status: FY2026 capex expected to exceed $25B; FY2027 equipment spend expected higher.
    signal_if_positive: Capacity tied to signed agreements, HBM, and constrained nodes.
    signal_if_negative: Broad capacity expansion without demand commitments.
    severity: high
  - id: customer_agreements
    category: moat
    metric: Strategic customer agreements
    target_or_question: SCAs improve visibility and stabilize the business model.
    current_status: First five-year strategic customer agreement signed.
    signal_if_positive: More multi-year agreements, better prepayments, or stronger take-or-pay style commitments.
    signal_if_negative: Customers avoid commitments or renegotiate price downward.
    severity: high
  - id: ai_capex
    category: demand
    metric: Hyperscaler/GPU AI capex
    target_or_question: AI capex and GPU shipment outlook remain strong enough to absorb HBM supply.
    current_status: Thesis depends on AI data center memory demand.
    signal_if_positive: Hyperscalers raise capex; NVIDIA/AMD platform demand stays supply constrained.
    signal_if_negative: AI capex cuts, GPU order pushouts, or lower HBM attach expectations.
    severity: high
  - id: valuation_compression
    category: market_reaction
    metric: Multiple and narrative
    target_or_question: Market reaction is not simply a transition from supercycle narrative to peak-cycle narrative.
    current_status: Price exceeded $1,000 and market cap exceeded $1T; expectations are high.
    signal_if_positive: Pullbacks are expectation-driven while fundamentals strengthen.
    signal_if_negative: Strong earnings no longer prevent multiple compression because peak fears rise.
    severity: medium

reporting:
  default_history_days: 10
  default_news_days: 7
  output_formats:
    - markdown
